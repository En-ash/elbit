<!doctype html>
<html>
  <head>
    <title>Containers</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
      #wrapper-container {
        max-width: 900px;
        max-height: 650px;
        height: 650px;
        padding-left: 10px;
        padding-right: 10px;

        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      #get-form {
        width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #get-form .btn {
        width: 140px;
        height: 35px;
        font-size: medium;
        background-color: green;
        border: 0.3px solid black;
        color: black;
      }
      #get-form .btn:hover {
        background-color: white;
        border-style: solid;
        border-color: black;
        border-width: 0.5px;
      }
      #container {
      }
    </style>
  </head>
  <body>
    <div id="wrapper-container">
      <h1 id="title"><u>Docker containers running</u></h1>

      <form id="get-form" action="/" method="get">
        <input class="btn" type="submit" value="Update" />
      </form>

      {% if containers %}
      <div id="display-containers">
        <div>
          <ol>
            {% for container in containers %}
            <div class="container">
              <li value="{{loop.index}}">
                <b> Name: {{ container.name }}<br />ID: {{ container.id }} </b>
              </li>
            </div>
            {% endfor %}
          </ol>
        </div>
      </div>
      {% endif %}
    </div>
  </body>
</html>
